services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8001:8001"
    volumes:
      - cumulanael-data:/app/data
    environment:
      - API_HOST=0.0.0.0
      - API_PORT=8001
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-http://localhost:3001}
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8001}
    ports:
      - "3001:3001"
    depends_on:
      - api
    restart: unless-stopped

volumes:
  cumulanael-data:
